erking voor aanbeveling. Het promoten van plastische chirurgie bij minderjarigen kan leiden tot meer ontevredenheid over het lichaam. Daarom komt dergelijke content - waaronder voor-en-na-video's, video's van chirurgische ingrepen en berichten waarin facultatieve plastische chirurgie wordt besproken zonder waarschuwing voor de risico's - niet in aanmerking voor de 'Voor jou'-feed van alle gebruikers onder de 18 jaar.","vid_mod_analytics_penalty_reason_unoriginal_title":"Niet-originele, laagwaardige en QR-codecontent","vid_mod_analytics_penalty_reason_unoriginal_desc":"Om TikTok positief en plezierig te houden voor onze gebruikers, komt content die niet origineel of van lage kwaliteit is niet in aanmerking voor aanbeveling. Niet-originele content omvdat video's die slechts zijn geïmporteerd of gekopieerd van andere bronnen (zoals andere platformen, tv-programma's of webcasts) zonder nieuwe, creatieve bewerkingen. We kunnen zien dat een video niet-origineel is als deze een watermerk of logo bevat. Content van lage kwaliteit omvat zeer korte video's, statische afbeeldingen en video's die alleen uit GIF's bestaan. Content die QR-codes bevat, komt meestal niet in aanmerking voor de 'Voor jou'-feed, omdat deze gebruikers naar schadelijke websites of apps kunnen leiden, hoewel we uitzonderingen maken in omstandigheden waarin het risico laag is (bijvoorbeeld voor e-commerce).","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_title":"Niet-originele, laagwaardige en QR-codecontent","vid_mod_analytics_nr_vid_penalty_reason_unoriginal_desc":"Om de positieve ervaring te behouden die onze gebruikers van het TikTok-platform verwachten, komt content die niet origineel of van lage kwaliteit is niet in aanmerking voor aanbeveling. Niet-originele content is content die slechts is geïmporteerd of gekopieerd van andere bronnen zonder nieuwe, creatieve bewerkingen. Een video kan niet-origineel zijn als deze een watermerk of logo bevat. Content van lage kwaliteit omvat zeer korte video's, statische afbeeldingen en video's die alleen uit GIF's bestaan.","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_title":"Gereproduceerd account","vid_mod_analytics_nr_acct_penalty_reason_unoriginal_desc":"Je account bevat berichten die niet origineel zijn en niet in aanmerking komen voor de 'Voor jou'-feed. Zie onze Communityrichtlijnen voor meer informatie \u003E Niet geschikt voor de 'Voor jou'-feed \u003E Niet-originele, laagwaardige en QR-codecontent","vid_mod_analytics_penalty_reason_spam_title":"Spam, niet-authentieke, of misleidende content","vid_mod_analytics_penalty_reason_spam_desc":"Content die probeert gebruikers te misleiden of te manipuleren om meer volgers, likes, weergaven of andere interactiemetrieken op het platform te krijgen, komt niet in aanmerking voor de 'Voor jou'-feed. Dit omvat content die gebruikers aanmoedigt om elkaar te volgen of te liken, of content die gebruikers verleidt om op like- of deelknoppen te klikken. Bovendien komt content die samenzweringstheorieën promoot en valse of schadelijke informatie over actuele gebeurtenissen verspreidt waarvan de details zich nog ontwikkelen, niet in aanmerking voor de 'Voor jou'-feed.","vid_mod_analytics_penalty_reason_sexual_title":"Zeer seksueel getinte content","vid_mod_analytics_penalty_reason_sexual_desc":"Om een comfortabele ervaring te waarborgen, komt content die duidelijk seksueel suggestief is, niet in aanmerking voor aanbeveling. Dit omvat content die impliciete naaktheid toont, lichaamsdelen seksualiseert of overduidelijk erotisch of sensueel is (bijvoorbeeld stripteases).","vid_mod_analytics_penalty_reason_tobacco_title":"Tabaks- en alcoholproducten","vid_mod_analytics_penalty_reason_tobacco_desc":"Content die alcoholproducten promoot, vermeldt of afbeeldt terwijl ze worden geconsumeerd door personen die de wettelijke leeftijd hebben om te drinken, maar de producten op een gevaarlijke manier gebruiken, komt niet in aanmerking voor aanbeveling. Content waarin het gebruik van tabaksproducten door volwassenen wordt afgebeeld of waarin gereguleerde stoffen worden vermeld, komt niet in aanmerking voor aanbeveling.","vid_mod_analytics_penalty_reason_stunts_title":"Gevaarlijke stunts en sporten","vid_mod_analytics_penalty_reason_stunts_desc":"Wanneer bepaalde activiteiten zonder veiligheidsmaatregelen worden nagebootst, kunnen ze riskant of gevaarlijk zijn, wat kan leiden tot lichamelijk letsel. Content met gevaarlijke stunts of extreme sporten uitgevoerd door niet-professionals kan niet in aanmerking komen.","vid_mod_analytics_penalty_reason_graphic_title":"Gewelddadige en grafische content","vid_mod_analytics_penalty_reason_graphic_desc":"Content die kijkers ongemak, schok of afschuw bezorgt, komt mogelijk niet in aanmerking voor de 'Voor jou'-feed. Dit is content met onder andere schrikeffecten, jump scares, make-up die bloederige wonden realistisch nabootst en het uitbeelden van lichaamsfuncties. De meeste gewelddadige en grafische content is niet toegestaan op TikTok. We kunnen echter bepaalde soorten content toestaan, zoals afbeeldingen van sterfgevallen, ongelukken of gevechten, wanneer dat dient als documentatie van echte gebeurtenissen en wordt geacht in het algemeen belang te zijn. Omdat deze content mogelijk niet comfortabel is voor elke doelgroep, komt deze niet in aanmerking voor aanbeveling en zal de content een 'opt-in'-scherm of waarschuwing hebben.","vid_mod_analytics_penalty_reason_fyf_title":"Komt niet in aanmerking voor de 'Voor jou'-feed","vid_mod_analytics_penalty_reason_fyf_desc":"Je video voldoet niet aan onze criteria om in aanmerking te komen voor de 'Voor jou'-feed. Zie de Communityrichtlijnen van TikTok voor meer informatie \u003E Komt niet in aanmerking voor de 'Voor you'-feed","vidModAnalytics_detailPg_sectionHumanMod_sectionBody":"Gebruikers en derden kunnen schendingen van het beleid aan ons melden. We hebben deze beleidsschending geconstateerd op basis van een melding dat de content in strijd is met onze Communityrichtlijnen.","vidModAnalytics_detailPg_sectionVideoDetails_sectionLabel":"Videodetails","vid_mod_analytics_appeal_detailpg_reason_title":"Schendingsreden","vid_mod_analytics_detail_pg_title":"Video komt niet in aanmerking","vid_mod_analytics_detail_pg_desc":"Deze video komt niet in aanmerking voor de 'Voor jou'-feed, omdat deze onze Communityrichtlijnen schendt.","vidModAnalytics_detailPg_sectionSuccess_header":"Bezwaar goedgekeurd","vid_mod_analytics_appeal_success_detail_pg_desc":"We hebben je bezwaar beoordeeld en je video hersteld. Onze excuses voor eventueel ongemak dat dit heeft veroorzaakt. Bedankt dat je deel uitmaakt van de TikTok-community!","vid_mod_analytics_appeal_detail_pg_title":"Video verwijderd","vid_mod_analytics_appeal_detail_pg_desc":"Deze video schendt onze Communityrichtlijnen.","vidModAnalytics_appealSubmitted_sectionTitle_header":"Verzoek ontvangen","vid_mod_analytics_appeal_rcv_detail_pg_desc":"We hebben je verzoek ontvangen en laten je het weten wanneer het resultaat van je bezwaar beschikbaar is.","rIC_detailPg_violationReason_title":"Reden van schending","dsaCGWebapp_detailPg_sectionCG_link":"Communityrichtlijnen","dsaCGWebapp_appealExpired_emptyState_body":"Je kunt niet langer bezwaar maken tegen deze beslissing, omdat de bezwaartermijn is verstreken.","appeal_btn_new":"Bezwaar","reasonForAppeal_appealPg_appealReasonCard_title":"Reden voor bezwaar tegen de beslissing","oSA_appealPg_appealExplain_title":"Uitleg van bezwaar","rIC_appealPg_appealExplain_title":"Uitleg van bezwaar","oSA_appealPg_appealExplain_desc":"Geef zo gedetailleerd mogelijk aan waarom je het niet eens bent met de beslissing. Zo kunnen we je bezwaar goed beoordelen.","rIC_appealPg_appealExplain_desc":"Geef zo gedetailleerd mogelijk aan waarom je het niet eens bent met de beperking. Zo kunnen we je bezwaar goed beoordelen.","dsa_illegal_uploader_vio_appeal_exp_desc":"Geef zoveel mogelijk details over waarom je het oneens bent met de beperking. Zo kunnen we je bezwaa
